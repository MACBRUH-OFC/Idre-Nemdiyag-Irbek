<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>IDRE NEMDIYAAG IRBEK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background:#000;
}

#game-container{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(to bottom,#4facfe 0%,#00f2fe 100%);
}

/* SKY */

#sky{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.cloud{
    position:absolute;
    background:rgba(255,255,255,.82);
    border-radius:100px;
    filter:blur(.2px);
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:rgba(255,255,255,.82);
    border-radius:50%;
}

.cloud::before{
    width:60px;
    height:60px;
    top:-28px;
    left:18px;
}

.cloud::after{
    width:40px;
    height:40px;
    top:-15px;
    right:18px;
}

/* SUN */

#sun{
    position:absolute;
    top:80px;
    right:50px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:
    radial-gradient(circle,#fff8c6,#ffd54f);
    box-shadow:
    0 0 40px rgba(255,215,0,.6),
    0 0 90px rgba(255,215,0,.4);
    z-index:0;
}

/* GROUND */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:95px;
    background:
    linear-gradient(to bottom,#8BC34A,#43A047);
    border-top:4px solid #2E7D32;
    z-index:8;
}

/* PLAYER */

#character{
    position:absolute;
    width:88px;
    height:88px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:50;
    transition:transform .08s linear;
    filter:
    drop-shadow(0 8px 12px rgba(0,0,0,.3));
}

/* HUD */

#hud{
    position:absolute;
    top:0;
    width:100%;
    padding:12px;
    z-index:300;
}

#top-bar{
    width:100%;
    padding:12px 16px;
    border-radius:22px;
    background:rgba(0,0,0,.28);
    backdrop-filter:blur(12px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:white;
    border:1px solid rgba(255,255,255,.12);
}

.left-hud{
    display:flex;
    align-items:center;
    gap:12px;
}

#score-box{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:22px;
    font-weight:800;
}

#score-box i{
    color:#FFD54F;
}

#difficulty-box{
    display:flex;
    flex-direction:column;
    gap:4px;
}

#difficulty-box span{
    font-size:12px;
    opacity:.8;
}

#difficulty-bar{
    width:120px;
    height:8px;
    border-radius:20px;
    background:rgba(255,255,255,.18);
    overflow:hidden;
}

#difficulty-fill{
    height:100%;
    width:0%;
    border-radius:20px;
    background:
    linear-gradient(to right,#4CAF50,#FFC107,#F44336);
    transition:width .4s ease;
}

/* DEVELOPER */

#developer-credit{
    display:flex;
    align-items:center;
    gap:10px;
    padding:6px 10px;
    border-radius:30px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.08);
}

#developer-credit img{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.2);
}

.dev-info{
    line-height:1.2;
}

.dev-name{
    font-size:13px;
    font-weight:700;
}

.dev-tag{
    font-size:10px;
    opacity:.75;
}

/* BUTTON */

.control-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    color:white;
    font-size:16px;
}

/* PIPES */

.pipe{
    position:absolute;
    width:82px;
    overflow:hidden;
    z-index:20;
    border-radius:14px;
    background:rgba(255,255,255,.04);
}

.pipe-inner{
    width:100%;
    height:100%;
    background-image:
    url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp');
    background-repeat:repeat-y;
    background-size:72px;
    background-position:center;
}

/* REWARD */

.reward{
    position:absolute;
    width:60px;
    height:60px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:30;
    filter:
    drop-shadow(0 0 10px rgba(255,255,255,.35));
    animation:rewardFloat 1.4s ease-in-out infinite;
}

@keyframes rewardFloat{
    0%,100%{
        transform:translateY(0px) scale(1);
    }
    50%{
        transform:translateY(-8px) scale(1.06);
    }
}

/* TAP */

#tap-text{
    position:absolute;
    width:100%;
    bottom:130px;
    text-align:center;
    color:white;
    font-size:22px;
    font-weight:800;
    z-index:100;
    text-shadow:0 3px 12px rgba(0,0,0,.5);
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.4;
    }
}

/* OVERLAYS */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:500;
}

.card{
    width:88%;
    max-width:420px;
    padding:28px;
    border-radius:30px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.12);
}

.card h1{
    font-size:38px;
    margin-bottom:8px;
    background:
    linear-gradient(to right,#ff9966,#ff5e62);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card p{
    opacity:.8;
    margin-bottom:24px;
}

.big-btn{
    width:100%;
    margin-top:12px;
    border:none;
    border-radius:20px;
    padding:16px;
    color:white;
    font-size:18px;
    font-weight:800;
    background:
    linear-gradient(to right,#ff512f,#dd2476);
}

.big-btn:active{
    transform:scale(.97);
}

/* GAME OVER */

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.stats h2{
    font-size:34px;
}

/* PARTICLES */

.particle{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    z-index:120;
}

/* RESPONSIVE */

@media(max-width:460px){

    #character{
        width:78px;
        height:78px;
    }

    .pipe{
        width:74px;
    }

    #developer-credit{
        gap:7px;
        padding:5px 8px;
    }

    #developer-credit img{
        width:30px;
        height:30px;
    }

}

</style>
</head>

<body>

<div id="game-container">

    <div id="sky"></div>

    <div id="sun"></div>

    <div id="ground"></div>

    <div id="character"></div>

    <!-- HUD -->

    <div id="hud">

        <div id="top-bar">

            <div class="left-hud">

                <div id="score-box">
                    <i class="fas fa-star"></i>
                    <span id="score">0</span>
                </div>

                <div id="difficulty-box">

                    <span>Difficulty</span>

                    <div id="difficulty-bar">
                        <div id="difficulty-fill"></div>
                    </div>

                </div>

            </div>

            <div class="left-hud">

                <div id="developer-credit">

                    <img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/IMG_20251123_090853_814.webp">

                    <div class="dev-info">
                        <div class="dev-name">
                            Developer
                        </div>
                        <div class="dev-tag">
                            @justbeingchiru
                        </div>
                    </div>

                </div>

                <button class="control-btn" id="muteBtn">
                    <i class="fas fa-volume-up"></i>
                </button>

            </div>

        </div>

    </div>

    <!-- TAP TEXT -->

    <div id="tap-text">
        TAP ANYWHERE TO FLY
    </div>

    <!-- START -->

    <div id="startOverlay" class="overlay">

        <div class="card">

            <h1>IDRE NEMDIYAAG IRBEK</h1>

            <p>
                Smooth gravity • Better balance • More addictive gameplay
            </p>

            <button class="big-btn" id="playBtn">
                <i class="fas fa-play"></i>
                START GAME
            </button>

        </div>

    </div>

    <!-- GAME OVER -->

    <div id="gameOverOverlay" class="overlay" style="display:none;">

        <div class="card">

            <img
            src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Game%20over.png"
            style="width:100%;margin-bottom:10px;">

            <div class="stats">

                <div>
                    <small>Score</small>
                    <h2 id="finalScore">0</h2>
                </div>

                <div>
                    <small>Best</small>
                    <h2 id="bestScore">0</h2>
                </div>

            </div>

            <button class="big-btn" id="restartBtn">
                PLAY AGAIN
            </button>

        </div>

    </div>

</div>

<!-- PRELOAD ASSETS -->

<div style="display:none">

<img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png">
<img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp">
<img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png">
<img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png">
<img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Game%20over.png">

</div>

<!-- AUDIO -->

<audio id="flapSound" preload="auto">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Flap.mp3">
</audio>

<audio id="pointSound" preload="auto">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Point.mp3">
</audio>

<audio id="heartSound" preload="auto">
<source src="https://github.com/MACBRUH-OFC/-Simulator/blob/main/Resources/Audio/Heart.mp3?raw=true">
</audio>

<audio id="gameOverSound" preload="auto">
<source src="https://github.com/MACBRUH-OFC/-Simulator/blob/main/Resources/Audio/GameOverSound.mp3?raw=true">
</audio>

<script>

/* =========================
   ASSETS PRELOAD
========================= */

const preloadImages = [

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png',
'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp',
'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png',
'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png',
'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Game%20over.png'

];

preloadImages.forEach(src=>{

    const img = new Image();
    img.src = src;

});

/* =========================
   ELEMENTS
========================= */

const game = document.getElementById("game-container");
const character = document.getElementById("character");

const scoreText = document.getElementById("score");
const finalScoreText = document.getElementById("finalScore");
const bestScoreText = document.getElementById("bestScore");

const playBtn = document.getElementById("playBtn");
const restartBtn = document.getElementById("restartBtn");

const startOverlay = document.getElementById("startOverlay");
const gameOverOverlay = document.getElementById("gameOverOverlay");

const difficultyFill = document.getElementById("difficulty-fill");

const flapSound = document.getElementById("flapSound");
const pointSound = document.getElementById("pointSound");
const heartSound = document.getElementById("heartSound");
const gameOverSound = document.getElementById("gameOverSound");

const muteBtn = document.getElementById("muteBtn");

/* =========================
   PLAYER IMAGE
========================= */

character.style.backgroundImage =
"url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png')";

/* =========================
   PHYSICS
========================= */

const PHYSICS = {

    gravity:0.20,
    jump:-5.9,
    terminal:5.5,

    speed:2.9,

    gap:300,
    minGap:235,

    spawnRate:2100

};

/* =========================
   GAME STATE
========================= */

let playing = false;

let y = window.innerHeight / 2;
let velocity = 0;

let pipes = [];
let rewards = [];

let score = 0;

let difficulty = 0;

let animation;

let lastSpawn = 0;

let muted = false;

let best =
localStorage.getItem("darshan_best_score") || 0;

bestScoreText.innerText = best;

/* =========================
   CREATE CLOUDS
========================= */

function createClouds(){

    const sky = document.getElementById("sky");

    for(let i=0;i<5;i++){

        const cloud = document.createElement("div");

        cloud.className = "cloud";

        const w = rand(90,160);
        const h = rand(40,70);

        cloud.style.width = w + "px";
        cloud.style.height = h + "px";

        let x = rand(0,window.innerWidth);
        let top = rand(30,260);

        cloud.style.left = x + "px";
        cloud.style.top = top + "px";

        sky.appendChild(cloud);

        animateCloud(cloud,w,x);

    }

}

function animateCloud(cloud,w,x){

    function move(){

        x -= .22;

        if(x < -w){

            x = window.innerWidth + 50;

        }

        cloud.style.left = x + "px";

        requestAnimationFrame(move);

    }

    move();

}

createClouds();

/* =========================
   START GAME
========================= */

playBtn.onclick = startGame;
restartBtn.onclick = startGame;

function startGame(){

    startOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";

    resetGame();

    playing = true;

    loop();

}

/* =========================
   RESET
========================= */

function resetGame(){

    pipes.forEach(p=>{

        p.top.remove();
        p.bottom.remove();

    });

    rewards.forEach(r=>r.el.remove());

    pipes = [];
    rewards = [];

    score = 0;

    difficulty = 0;

    scoreText.innerText = 0;

    difficultyFill.style.width = "0%";

    y = window.innerHeight / 2;

    velocity = 0;

}

/* =========================
   CONTROLS
========================= */

game.addEventListener("click", flap);

document.addEventListener("keydown", e=>{

    if(e.code === "Space"){

        e.preventDefault();

        flap();

    }

});

function flap(){

    if(!playing) return;

    velocity = PHYSICS.jump;

    character.style.transform =
    "rotate(-16deg)";

    playAudio(flapSound);

    particles(
        character.offsetLeft + 30,
        y + 50
    );

}

/* =========================
   LOOP
========================= */

function loop(){

    if(!playing) return;

    updatePhysics();

    updatePipes();

    updateRewards();

    collisions();

    animation = requestAnimationFrame(loop);

}

/* =========================
   UPDATE PLAYER
========================= */

function updatePhysics(){

    velocity += PHYSICS.gravity;

    if(velocity > PHYSICS.terminal){

        velocity = PHYSICS.terminal;

    }

    y += velocity;

    if(y < 0){

        y = 0;
        velocity = 0;

    }

    const groundY =
    window.innerHeight -
    95 -
    character.clientHeight;

    if(y >= groundY){

        y = groundY;

        endGame();

    }

    character.style.left = "22vw";
    character.style.top = y + "px";

    if(velocity > 1){

        character.style.transform =
        `rotate(${velocity * 3.5}deg)`;

    }

}

/* =========================
   PIPES
========================= */

function updatePipes(){

    const now = Date.now();

    if(now - lastSpawn > PHYSICS.spawnRate){

        spawnPipe();

        lastSpawn = now;

    }

    pipes.forEach((pipe,index)=>{

        pipe.x -= PHYSICS.speed;

        pipe.top.style.left =
        pipe.x + "px";

        pipe.bottom.style.left =
        pipe.x + "px";

        if(
            !pipe.passed &&
            pipe.x < window.innerWidth * .22
        ){

            pipe.passed = true;

            score++;

            scoreText.innerText = score;

            playAudio(pointSound);

        }

        if(pipe.x < -120){

            pipe.top.remove();
            pipe.bottom.remove();

            pipes.splice(index,1);

        }

    });

}

/* =========================
   SPAWN PIPE
========================= */

function spawnPipe(){

    difficulty += .13;

    if(difficulty > 10){

        difficulty = 10;

    }

    difficultyFill.style.width =
    (difficulty * 10) + "%";

    const gap =
    Math.max(
        PHYSICS.minGap,
        PHYSICS.gap - difficulty * 4
    );

    const topHeight =
    rand(
        120,
        window.innerHeight - gap - 260
    );

    const bottomY =
    topHeight + gap;

    const bottomHeight =
    window.innerHeight -
    bottomY -
    95;

    const topPipe =
    document.createElement("div");

    topPipe.className = "pipe";

    topPipe.style.height =
    topHeight + "px";

    topPipe.style.left =
    window.innerWidth + "px";

    topPipe.style.top = "0";

    const topInner =
    document.createElement("div");

    topInner.className = "pipe-inner";

    topPipe.appendChild(topInner);

    game.appendChild(topPipe);

    const bottomPipe =
    document.createElement("div");

    bottomPipe.className = "pipe";

    bottomPipe.style.height =
    bottomHeight + "px";

    bottomPipe.style.left =
    window.innerWidth + "px";

    bottomPipe.style.top =
    bottomY + "px";

    const bottomInner =
    document.createElement("div");

    bottomInner.className = "pipe-inner";

    bottomPipe.appendChild(bottomInner);

    game.appendChild(bottomPipe);

    pipes.push({

        x:window.innerWidth,
        top:topPipe,
        bottom:bottomPipe,
        passed:false

    });

    if(Math.random() > .35){

        spawnReward(
            window.innerWidth + 180,
            topHeight + gap/2 - 30
        );

    }

}

/* =========================
   REWARDS
========================= */

function spawnReward(xPos,yPos){

    const reward =
    document.createElement("div");

    reward.className = "reward";

    const isHeart = Math.random() > .5;

    reward.style.backgroundImage =
    isHeart
    ?
    "url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png')"
    :
    "url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png')";

    reward.style.left = xPos + "px";
    reward.style.top = yPos + "px";

    game.appendChild(reward);

    rewards.push({

        x:xPos,
        y:yPos,
        el:reward

    });

}

function updateRewards(){

    rewards.forEach((reward,index)=>{

        reward.x -= PHYSICS.speed;

        reward.el.style.left =
        reward.x + "px";

        if(rectHit(character,reward.el)){

            score += 5;

            scoreText.innerText = score;

            particles(
                reward.x + 20,
                reward.y + 20
            );

            playAudio(heartSound);

            reward.el.remove();

            rewards.splice(index,1);

        }

        if(reward.x < -80){

            reward.el.remove();

            rewards.splice(index,1);

        }

    });

}

/* =========================
   COLLISION
========================= */

function collisions(){

    for(let pipe of pipes){

        if(
            rectHit(character,pipe.top) ||
            rectHit(character,pipe.bottom)
        ){

            endGame();

        }

    }

}

/* =========================
   END GAME
========================= */

function endGame(){

    if(!playing) return;

    playing = false;

    cancelAnimationFrame(animation);

    playAudio(gameOverSound);

    if(score > best){

        best = score;

        localStorage.setItem(
            "darshan_best_score",
            best
        );

    }

    finalScoreText.innerText = score;

    bestScoreText.innerText = best;

    gameOverOverlay.style.display =
    "flex";

}

/* =========================
   AUDIO
========================= */

function playAudio(audio){

    if(muted) return;

    audio.currentTime = 0;

    audio.play();

}

muteBtn.onclick = ()=>{

    muted = !muted;

    muteBtn.innerHTML =
    muted
    ?
    '<i class="fas fa-volume-mute"></i>'
    :
    '<i class="fas fa-volume-up"></i>';

};

/* =========================
   PARTICLES
========================= */

function particles(x,y){

    for(let i=0;i<10;i++){

        const p =
        document.createElement("div");

        p.className = "particle";

        const size = rand(4,10);

        p.style.width = size + "px";
        p.style.height = size + "px";

        p.style.left = x + "px";
        p.style.top = y + "px";

        p.style.background =
        `rgba(255,255,255,.9)`;

        game.appendChild(p);

        let life = 30;

        let vx = (Math.random()-.5)*5;
        let vy = (Math.random()-.5)*5;

        function move(){

            if(life <= 0){

                p.remove();

                return;

            }

            life--;

            x += vx;
            y += vy;

            p.style.left = x + "px";
            p.style.top = y + "px";

            p.style.opacity = life/30;

            requestAnimationFrame(move);

        }

        move();

    }

}

/* =========================
   HITBOX
========================= */

function rectHit(a,b){

    const r1 = a.getBoundingClientRect();
    const r2 = b.getBoundingClientRect();

    return !(

        r1.top > r2.bottom ||
        r1.bottom < r2.top ||
        r1.right < r2.left ||
        r1.left > r2.right

    );

}

/* =========================
   RANDOM
========================= */

function rand(min,max){

    return Math.floor(
        Math.random() * (max-min) + min
    );

}

</script>

</body>
</html>
