<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>IDRE NEMDIYAAG IRBEK</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    font-family:Segoe UI,sans-serif;
    background:#000;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(to bottom,#56ccf2,#2f80ed);
}

/* SKY */

#sky{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.cloud{
    position:absolute;
    background:rgba(255,255,255,.8);
    border-radius:100px;
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:rgba(255,255,255,.8);
    border-radius:50%;
}

.cloud::before{
    width:50px;
    height:50px;
    top:-25px;
    left:15px;
}

.cloud::after{
    width:40px;
    height:40px;
    top:-15px;
    right:15px;
}

/* GROUND */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:100px;
    background:
        linear-gradient(to bottom,#59c173,#2d8f47);
    border-top:4px solid #1f6d35;
    z-index:5;
}

/* CHARACTER */

#player{
    position:absolute;
    width:82px;
    height:82px;
    z-index:50;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    transition:transform .08s linear;
}

/* HUD */

#hud{
    position:absolute;
    top:0;
    width:100%;
    padding:14px;
    z-index:200;
}

#topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 18px;
    border-radius:20px;
    background:rgba(0,0,0,.28);
    backdrop-filter:blur(10px);
    color:white;
}

.hud-box{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    font-size:18px;
}

#difficulty{
    width:130px;
    height:10px;
    border-radius:20px;
    background:rgba(255,255,255,.2);
    overflow:hidden;
}

#difficulty-fill{
    height:100%;
    width:0%;
    border-radius:20px;
    background:linear-gradient(to right,#4caf50,#ff9800,#f44336);
}

/* BUTTONS */

.icon-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.18);
    color:white;
    font-size:17px;
}

.icon-btn:active{
    transform:scale(.92);
}

/* OBSTACLES */

.pipe{
    position:absolute;
    width:88px;
    z-index:20;
    overflow:hidden;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    border:2px solid rgba(255,255,255,.12);
}

.pipe-stack{
    width:100%;
    height:100%;
    background-image:url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp');
    background-size:72px;
    background-repeat:repeat-y;
    background-position:center;
}

/* COINS */

.coin{
    position:absolute;
    width:58px;
    height:58px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:30;
    animation:floatCoin 1s infinite ease-in-out;
}

@keyframes floatCoin{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-6px);
    }
}

/* START MENU */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
    z-index:500;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:28px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    text-align:center;
    color:white;
    border:1px solid rgba(255,255,255,.15);
}

.title{
    font-size:38px;
    font-weight:900;
    margin-bottom:8px;
    background:linear-gradient(to right,#ff9966,#ff5e62);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    opacity:.85;
    margin-bottom:24px;
}

.big-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    margin-top:12px;
    font-size:18px;
    font-weight:800;
    color:white;
    background:linear-gradient(to right,#ff512f,#dd2476);
}

.big-btn:active{
    transform:scale(.97);
}

#tap-text{
    position:absolute;
    bottom:120px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    font-weight:700;
    z-index:100;
    text-shadow:0 2px 8px rgba(0,0,0,.5);
    animation:pulse 1.3s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.5;
    }
}

/* GAME OVER */

#gameover{
    display:none;
}

.stats{
    margin-top:20px;
    display:flex;
    justify-content:space-around;
}

.stat-number{
    font-size:30px;
    font-weight:900;
}

/* PARTICLES */

.particle{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    z-index:90;
}

/* RESPONSIVE */

@media(max-width:450px){

    #player{
        width:74px;
        height:74px;
    }

    .pipe{
        width:78px;
    }

}
</style>
</head>

<body>

<div id="game">

    <div id="sky"></div>

    <div id="ground"></div>

    <div id="player"></div>

    <div id="hud">

        <div id="topbar">

            <div class="hud-box">
                <i class="fas fa-star"></i>
                <span id="score">0</span>
            </div>

            <div class="hud-box">
                <span>Difficulty</span>

                <div id="difficulty">
                    <div id="difficulty-fill"></div>
                </div>
            </div>

            <button id="pauseBtn" class="icon-btn">
                <i class="fas fa-pause"></i>
            </button>

        </div>

    </div>

    <div id="tap-text">
        TAP TO FLY
    </div>

    <!-- START -->

    <div id="startMenu" class="overlay">

        <div class="card">

            <div class="title">
                IDRE NEMDIYAAG IRBEK
            </div>

            <div class="subtitle">
                Smooth gameplay • Better gravity • Balanced difficulty
            </div>

            <button id="startBtn" class="big-btn">
                <i class="fas fa-play"></i>
                START GAME
            </button>

        </div>

    </div>

    <!-- GAME OVER -->

    <div id="gameover" class="overlay">

        <div class="card">

            <div class="title">
                GAME OVER
            </div>

            <div class="stats">

                <div>
                    <div>Score</div>
                    <div class="stat-number" id="finalScore">0</div>
                </div>

                <div>
                    <div>Best</div>
                    <div class="stat-number" id="bestScore">0</div>
                </div>

            </div>

            <button id="restartBtn" class="big-btn">
                PLAY AGAIN
            </button>

        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="flapAudio">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Flap.mp3">
</audio>

<audio id="pointAudio">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Point.mp3">
</audio>

<audio id="overAudio">
<source src="https://github.com/MACBRUH-OFC/-Simulator/blob/main/Resources/Audio/GameOverSound.mp3?raw=true">
</audio>

<script>

/* =========================
   GAME CONFIG
========================= */

const GAME = {

    gravity:0.34,
    jump:-7.8,
    terminal:9,

    pipeGap:270,
    minPipeGap:220,

    pipeWidth:88,

    speed:3.2,

    spawnTime:1700

};

/* =========================
   ELEMENTS
========================= */

const player = document.getElementById("player");
const game = document.getElementById("game");

const scoreText = document.getElementById("score");
const finalScore = document.getElementById("finalScore");
const bestScoreText = document.getElementById("bestScore");

const difficultyFill = document.getElementById("difficulty-fill");

const startMenu = document.getElementById("startMenu");
const gameover = document.getElementById("gameover");

const flapAudio = document.getElementById("flapAudio");
const pointAudio = document.getElementById("pointAudio");
const overAudio = document.getElementById("overAudio");

/* =========================
   PLAYER IMAGE
========================= */

player.style.backgroundImage =
"url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png')";

/* =========================
   GAME STATE
========================= */

let playing = false;

let playerY = 250;
let velocity = 0;

let pipes = [];
let coins = [];

let score = 0;

let best = localStorage.getItem("bestScoreDarshan") || 0;

let lastSpawn = 0;

let difficulty = 0;

let animation;

/* =========================
   INIT
========================= */

bestScoreText.innerText = best;

createClouds();

updatePlayer();

/* =========================
   CONTROLS
========================= */

document.getElementById("startBtn").onclick = startGame;
document.getElementById("restartBtn").onclick = restartGame;

game.addEventListener("click", flap);
document.addEventListener("keydown", e=>{

    if(e.code === "Space"){
        e.preventDefault();
        flap();
    }

});

/* =========================
   START GAME
========================= */

function startGame(){

    startMenu.style.display = "none";
    gameover.style.display = "none";

    resetGame();

    playing = true;

    animation = requestAnimationFrame(loop);

}

/* =========================
   RESET
========================= */

function resetGame(){

    pipes.forEach(p=>{
        p.top.remove();
        p.bottom.remove();
    });

    coins.forEach(c=>c.el.remove());

    pipes = [];
    coins = [];

    score = 0;
    difficulty = 0;

    updateScore();

    playerY = window.innerHeight/2;

    velocity = 0;

    updatePlayer();

}

/* =========================
   FLAP
========================= */

function flap(){

    if(!playing) return;

    velocity = GAME.jump;

    flapAudio.currentTime = 0;
    flapAudio.play();

    createParticles(
        player.offsetLeft+40,
        playerY+40
    );

}

/* =========================
   LOOP
========================= */

function loop(){

    updatePhysics();

    updatePipes();

    updateCoins();

    detectCollision();

    animation = requestAnimationFrame(loop);

}

/* =========================
   PHYSICS
========================= */

function updatePhysics(){

    velocity += GAME.gravity;

    if(velocity > GAME.terminal){
        velocity = GAME.terminal;
    }

    playerY += velocity;

    if(playerY < 0){
        playerY = 0;
        velocity = 0;
    }

    const groundY =
    window.innerHeight - 100 - player.clientHeight;

    if(playerY >= groundY){

        playerY = groundY;

        endGame();

    }

    player.style.transform =
    `rotate(${velocity * 4}deg)`;

    updatePlayer();

}

/* =========================
   UPDATE PLAYER
========================= */

function updatePlayer(){

    player.style.left = "22vw";
    player.style.top = playerY + "px";

}

/* =========================
   PIPES
========================= */

function updatePipes(){

    const now = Date.now();

    if(now - lastSpawn > GAME.spawnTime){

        spawnPipe();

        lastSpawn = now;

    }

    pipes.forEach((pipe,index)=>{

        pipe.x -= GAME.speed;

        pipe.top.style.left = pipe.x + "px";
        pipe.bottom.style.left = pipe.x + "px";

        if(!pipe.passed &&
            pipe.x < window.innerWidth * .22){

            pipe.passed = true;

            score++;

            updateScore();

            pointAudio.currentTime = 0;
            pointAudio.play();

        }

        if(pipe.x < -100){

            pipe.top.remove();
            pipe.bottom.remove();

            pipes.splice(index,1);

        }

    });

}

/* =========================
   SPAWN PIPE
========================= */

function spawnPipe(){

    difficulty += 0.15;

    if(difficulty > 10){
        difficulty = 10;
    }

    difficultyFill.style.width =
    (difficulty * 10) + "%";

    const gap =
    Math.max(
        GAME.minPipeGap,
        GAME.pipeGap - difficulty * 5
    );

    const topHeight =
    random(120,
    window.innerHeight - gap - 260);

    const bottomY =
    topHeight + gap;

    const bottomHeight =
    window.innerHeight -
    bottomY -
    100;

    const top = document.createElement("div");

    top.className = "pipe";

    top.style.height = topHeight + "px";
    top.style.left = window.innerWidth + "px";
    top.style.top = "0px";

    const topStack = document.createElement("div");
    topStack.className = "pipe-stack";

    top.appendChild(topStack);

    game.appendChild(top);

    const bottom = document.createElement("div");

    bottom.className = "pipe";

    bottom.style.height = bottomHeight + "px";
    bottom.style.left = window.innerWidth + "px";
    bottom.style.top = bottomY + "px";

    const bottomStack = document.createElement("div");
    bottomStack.className = "pipe-stack";

    bottom.appendChild(bottomStack);

    game.appendChild(bottom);

    pipes.push({

        x:window.innerWidth,
        top,
        bottom,
        passed:false

    });

    if(Math.random() > .4){

        spawnCoin(
            window.innerWidth + 180,
            topHeight + gap/2 - 30
        );

    }

}

/* =========================
   COINS
========================= */

function spawnCoin(x,y){

    const coin = document.createElement("div");

    coin.className = "coin";

    const isHeart = Math.random() > .5;

    coin.style.backgroundImage =
    isHeart
    ? "url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png')"
    : "url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png')";

    coin.style.left = x + "px";
    coin.style.top = y + "px";

    game.appendChild(coin);

    coins.push({

        x,
        y,
        el:coin

    });

}

function updateCoins(){

    coins.forEach((coin,index)=>{

        coin.x -= GAME.speed;

        coin.el.style.left = coin.x + "px";

        const hit =
        rectHit(player,coin.el);

        if(hit){

            createParticles(
                coin.x+20,
                coin.y+20
            );

            score += 5;

            updateScore();

            coin.el.remove();

            coins.splice(index,1);

        }

        if(coin.x < -100){

            coin.el.remove();

            coins.splice(index,1);

        }

    });

}

/* =========================
   COLLISION
========================= */

function detectCollision(){

    for(let pipe of pipes){

        if(
            rectHit(player,pipe.top) ||
            rectHit(player,pipe.bottom)
        ){

            endGame();

        }

    }

}

/* =========================
   END GAME
========================= */

function endGame(){

    if(!playing) return;

    playing = false;

    cancelAnimationFrame(animation);

    overAudio.currentTime = 0;
    overAudio.play();

    if(score > best){

        best = score;

        localStorage.setItem(
            "bestScoreDarshan",
            best
        );

    }

    finalScore.innerText = score;
    bestScoreText.innerText = best;

    gameover.style.display = "flex";

}

/* =========================
   SCORE
========================= */

function updateScore(){

    scoreText.innerText = score;

}

/* =========================
   COLLISION FUNCTION
========================= */

function rectHit(a,b){

    const r1 = a.getBoundingClientRect();
    const r2 = b.getBoundingClientRect();

    return !(
        r1.top > r2.bottom ||
        r1.bottom < r2.top ||
        r1.right < r2.left ||
        r1.left > r2.right
    );

}

/* =========================
   RANDOM
========================= */

function random(min,max){

    return Math.floor(
        Math.random() * (max-min) + min
    );

}

/* =========================
   PARTICLES
========================= */

function createParticles(x,y){

    for(let i=0;i<10;i++){

        const p = document.createElement("div");

        p.className = "particle";

        const size = random(4,10);

        p.style.width = size+"px";
        p.style.height = size+"px";

        p.style.background =
        `rgba(255,255,255,.9)`;

        p.style.left = x+"px";
        p.style.top = y+"px";

        game.appendChild(p);

        const vx = (Math.random()-.5)*6;
        const vy = (Math.random()-.5)*6;

        let life = 30;

        const move = ()=>{

            if(life <= 0){

                p.remove();

                return;

            }

            life--;

            x += vx;
            y += vy;

            p.style.left = x+"px";
            p.style.top = y+"px";

            p.style.opacity = life/30;

            requestAnimationFrame(move);

        };

        move();

    }

}

/* =========================
   CLOUDS
========================= */

function createClouds(){

    const sky = document.getElementById("sky");

    for(let i=0;i<6;i++){

        const c = document.createElement("div");

        c.className = "cloud";

        const w = random(90,160);
        const h = random(40,70);

        c.style.width = w+"px";
        c.style.height = h+"px";

        c.style.left =
        random(0,window.innerWidth)+"px";

        c.style.top =
        random(30,300)+"px";

        sky.appendChild(c);

        animateCloud(c,w);

    }

}

function animateCloud(cloud,w){

    let x = parseFloat(cloud.style.left);

    function move(){

        x -= .3;

        if(x < -w){

            x = window.innerWidth + 100;

        }

        cloud.style.left = x + "px";

        requestAnimationFrame(move);

    }

    move();

}

/* =========================
   RESTART
========================= */

function restartGame(){

    startGame();

}

</script>

</body>
</html>
