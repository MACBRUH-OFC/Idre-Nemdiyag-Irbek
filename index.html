<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>IDRE NEMDIYAAG IRBEK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background:#000;
}

/* =======================================================
   MAIN GAME
======================================================= */

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(to bottom,
    #58b7ff 0%,
    #47d6ff 40%,
    #9fe8ff 100%);
}

/* =======================================================
   PREMIUM BACKGROUND
======================================================= */

#sky{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

#sun{
    position:absolute;
    top:70px;
    right:70px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:
    radial-gradient(circle,
    #fff8d0,
    #ffe082);
    box-shadow:
    0 0 60px rgba(255,215,0,.55),
    0 0 120px rgba(255,215,0,.25);
    z-index:0;
}

.mountain{
    position:absolute;
    bottom:95px;
    background:
    linear-gradient(to top,
    rgba(0,0,0,.12),
    rgba(255,255,255,.08));
    clip-path:polygon(50% 0%,0% 100%,100% 100%);
    z-index:2;
}

.cloud{
    position:absolute;
    background:rgba(255,255,255,.85);
    border-radius:100px;
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:rgba(255,255,255,.85);
    border-radius:50%;
}

.cloud::before{
    width:60px;
    height:60px;
    top:-30px;
    left:18px;
}

.cloud::after{
    width:42px;
    height:42px;
    top:-18px;
    right:18px;
}

/* =======================================================
   GROUND
======================================================= */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:95px;
    background:
    linear-gradient(to bottom,
    #78d64b,
    #2f9e44);
    border-top:5px solid #1f7a2f;
    z-index:8;
}

#grass-line{
    position:absolute;
    top:0;
    width:100%;
    height:18px;
    background:
    repeating-linear-gradient(
    -45deg,
    #b9ff7f,
    #b9ff7f 10px,
    #91e95b 10px,
    #91e95b 20px);
}

/* =======================================================
   PLAYER
======================================================= */

#player{
    position:absolute;
    width:88px;
    height:88px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:60;
    transition:transform .08s linear;
    filter:
    drop-shadow(0 10px 14px rgba(0,0,0,.28));
}

/* =======================================================
   TOP HEADER
======================================================= */

#top-header{
    position:absolute;
    top:0;
    width:100%;
    padding:14px;
    z-index:300;
}

#header-box{
    width:100%;
    border-radius:28px;
    padding:14px 16px;
    background:
    rgba(0,0,0,.25);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.12);

    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LEFT */

#left-ui{
    display:flex;
    align-items:center;
    gap:14px;
}

#score-box{
    display:flex;
    align-items:center;
    gap:8px;
    color:white;
    font-size:22px;
    font-weight:800;
}

#score-box i{
    color:#ffd54f;
}

#difficulty-box{
    display:flex;
    flex-direction:column;
    gap:4px;
    color:white;
}

#difficulty-box small{
    opacity:.75;
    font-size:11px;
}

#difficulty-bar{
    width:120px;
    height:8px;
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,.18);
}

#difficulty-fill{
    width:0%;
    height:100%;
    border-radius:20px;
    background:
    linear-gradient(to right,
    #4caf50,
    #ffc107,
    #f44336);
    transition:width .35s ease;
}

/* RIGHT */

#right-ui{
    display:flex;
    align-items:center;
    gap:12px;
}

#dev-credit{
    display:flex;
    align-items:center;
    gap:10px;
    padding:7px 10px;
    border-radius:30px;
    background:rgba(255,255,255,.12);
}

#dev-credit img{
    width:38px;
    height:38px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.2);
}

.dev-text{
    color:white;
    line-height:1.15;
}

.dev-name{
    font-size:13px;
    font-weight:700;
}

.dev-tag{
    font-size:10px;
    opacity:.72;
}

.ui-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.16);
    color:white;
    font-size:16px;
}

/* =======================================================
   PIPES
======================================================= */

.pipe{
    position:absolute;
    width:82px;
    overflow:hidden;
    z-index:20;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:2px solid rgba(255,255,255,.08);
    box-shadow:
    0 6px 14px rgba(0,0,0,.18);
}

.pipe-inner{
    width:100%;
    height:100%;
    background-image:
    url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp');
    background-size:72px;
    background-repeat:repeat-y;
    background-position:center;
}

/* =======================================================
   REWARDS
======================================================= */

.reward{
    position:absolute;
    width:62px;
    height:62px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:35;

    animation:rewardFloat 1.4s infinite ease-in-out;

    filter:
    drop-shadow(0 0 14px rgba(255,255,255,.35));
}

@keyframes rewardFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* =======================================================
   TAP TEXT
======================================================= */

#tap-text{
    position:absolute;
    bottom:130px;
    width:100%;
    text-align:center;
    z-index:120;
    color:white;
    font-size:22px;
    font-weight:800;
    text-shadow:
    0 3px 10px rgba(0,0,0,.45);

    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.45;
    }
}

/* =======================================================
   FOOTER SOCIAL BAR
======================================================= */

#footer-bar{
    position:absolute;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    z-index:200;

    display:flex;
    gap:12px;

    padding:10px 14px;

    border-radius:30px;

    background:
    rgba(0,0,0,.22);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.1);
}

.social-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    text-decoration:none;

    font-size:18px;

    background:rgba(255,255,255,.14);

    transition:.2s;
}

.social-btn:active{
    transform:scale(.9);
}

/* =======================================================
   OVERLAY
======================================================= */

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:500;
}

.card{
    width:90%;
    max-width:420px;

    padding:30px;

    border-radius:32px;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    text-align:center;
    color:white;
}

.card h1{
    font-size:40px;

    margin-bottom:10px;

    background:
    linear-gradient(to right,
    #ff9966,
    #ff5e62);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card p{
    opacity:.8;
    margin-bottom:22px;
}

.big-btn{
    width:100%;
    border:none;

    margin-top:12px;

    padding:16px;

    border-radius:22px;

    color:white;

    font-size:18px;
    font-weight:800;

    background:
    linear-gradient(to right,
    #ff512f,
    #dd2476);
}

/* =======================================================
   GAME OVER SOCIALS ALWAYS VISIBLE
======================================================= */

#gameover-socials{
    display:flex;
    justify-content:center;
    gap:12px;

    margin-top:20px;
}

.game-social{
    text-decoration:none;
    color:white;

    background:rgba(255,255,255,.14);

    padding:12px 18px;

    border-radius:18px;

    font-size:14px;
    font-weight:700;
}

/* =======================================================
   SETTINGS PANEL
======================================================= */

#settings-panel{
    position:absolute;
    top:90px;
    right:14px;

    width:240px;

    padding:18px;

    border-radius:24px;

    background:
    rgba(0,0,0,.35);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.12);

    color:white;

    z-index:350;

    display:none;
}

.setting-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
}

.setting-item{
    margin-bottom:16px;
}

.setting-item label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    opacity:.85;
}

.setting-item input{
    width:100%;
}

/* =======================================================
   PARTICLES
======================================================= */

.particle{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    z-index:120;
}

/* =======================================================
   RESPONSIVE
======================================================= */

@media(max-width:460px){

    #player{
        width:78px;
        height:78px;
    }

    .pipe{
        width:72px;
    }

    #difficulty-bar{
        width:80px;
    }

    #dev-credit{
        padding:6px 8px;
    }

    #dev-credit img{
        width:32px;
        height:32px;
    }

    .dev-name{
        font-size:11px;
    }

}

</style>
</head>

<body>

<div id="game">

    <div id="sky"></div>

    <div id="sun"></div>

    <!-- MOUNTAINS -->

    <div class="mountain"
    style="left:-100px;width:400px;height:260px;"></div>

    <div class="mountain"
    style="left:220px;width:350px;height:220px;"></div>

    <div class="mountain"
    style="right:-100px;width:420px;height:280px;"></div>

    <!-- PLAYER -->

    <div id="player"></div>

    <!-- HEADER -->

    <div id="top-header">

        <div id="header-box">

            <div id="left-ui">

                <div id="score-box">
                    <i class="fas fa-star"></i>
                    <span id="score">0</span>
                </div>

                <div id="difficulty-box">

                    <small>Difficulty</small>

                    <div id="difficulty-bar">
                        <div id="difficulty-fill"></div>
                    </div>

                </div>

            </div>

            <div id="right-ui">

                <div id="dev-credit">

                    <img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/IMG_20251123_090853_814.webp">

                    <div class="dev-text">

                        <div class="dev-name">
                            Developer
                        </div>

                        <div class="dev-tag">
                            @justbeingchiru
                        </div>

                    </div>

                </div>

                <button class="ui-btn" id="muteBtn">
                    <i class="fas fa-volume-up"></i>
                </button>

                <button class="ui-btn" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                </button>

            </div>

        </div>

    </div>

    <!-- SETTINGS -->

    <div id="settings-panel">

        <div class="setting-title">
            Game Settings
        </div>

        <div class="setting-item">

            <label>Game Speed</label>

            <input type="range"
            min="2"
            max="5"
            step="0.1"
            value="2.9"
            id="speedRange">

        </div>

        <div class="setting-item">

            <label>Gravity</label>

            <input type="range"
            min="0.12"
            max="0.35"
            step="0.01"
            value="0.20"
            id="gravityRange">

        </div>

        <div class="setting-item">

            <label>Sound Volume</label>

            <input type="range"
            min="0"
            max="1"
            step="0.05"
            value="1"
            id="volumeRange">

        </div>

    </div>

    <!-- TAP -->

    <div id="tap-text">
        TAP TO FLY
    </div>

    <!-- FOOTER -->

    <div id="footer-bar">

        <a class="social-btn"
        href="https://www.instagram.com/justbeingchiru"
        target="_blank">

            <i class="fab fa-instagram"></i>

        </a>

        <a class="social-btn"
        href="https://www.instagram.com/macbruh_ff"
        target="_blank">

            <i class="fas fa-gamepad"></i>

        </a>

        <a class="social-btn"
        href="https://www.instagram.com/animetalkisofficial"
        target="_blank">

            <i class="fas fa-film"></i>

        </a>

    </div>

    <!-- GROUND -->

    <div id="ground">
        <div id="grass-line"></div>
    </div>

    <!-- START -->

    <div class="overlay"
    id="startOverlay">

        <div class="card">

            <h1>
                IDRE NEMDIYAAG IRBEK
            </h1>

            <p>
                Premium smooth gameplay experience
            </p>

            <button class="big-btn"
            id="startBtn">

                START GAME

            </button>

        </div>

    </div>

    <!-- GAME OVER -->

    <div class="overlay"
    id="gameOverOverlay"
    style="display:none;">

        <div class="card">

            <img
            src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Game%20over.png"
            style="width:100%;margin-bottom:10px;">

            <h1>
                GAME OVER
            </h1>

            <p>
                Try again and beat your high score
            </p>

            <div style="
            display:flex;
            justify-content:space-around;
            margin-top:20px;">

                <div>
                    <small>Score</small>
                    <h2 id="finalScore">0</h2>
                </div>

                <div>
                    <small>Best</small>
                    <h2 id="bestScore">0</h2>
                </div>

            </div>

            <button class="big-btn"
            id="restartBtn">

                PLAY AGAIN

            </button>

            <!-- ALWAYS VISIBLE SOCIALS -->

            <div id="gameover-socials">

                <a class="game-social"
                href="https://www.instagram.com/justbeingchiru"
                target="_blank">

                    <i class="fab fa-instagram"></i>
                    Main

                </a>

                <a class="game-social"
                href="https://www.instagram.com/macbruh_ff"
                target="_blank">

                    <i class="fas fa-gamepad"></i>
                    Gaming

                </a>

            </div>

        </div>

    </div>

</div>

<script>

/* =======================================================
   PLAYER IMAGE
======================================================= */

const player =
document.getElementById("player");

player.style.backgroundImage =
"url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png')";

/* =======================================================
   CLOUDS
======================================================= */

for(let i=0;i<5;i++){

    const c =
    document.createElement("div");

    c.className = "cloud";

    const w =
    rand(90,160);

    const h =
    rand(40,70);

    c.style.width = w+"px";
    c.style.height = h+"px";

    let x =
    rand(0,window.innerWidth);

    c.style.left = x+"px";

    c.style.top =
    rand(40,250)+"px";

    document
    .getElementById("sky")
    .appendChild(c);

    animateCloud(c,w,x);

}

function animateCloud(c,w,x){

    function move(){

        x -= .2;

        if(x < -w){

            x =
            window.innerWidth+50;

        }

        c.style.left =
        x+"px";

        requestAnimationFrame(move);

    }

    move();

}

/* =======================================================
   GAME STATE
======================================================= */

let gravity = 0.20;
let speed = 2.9;

let y = window.innerHeight/2;
let velocity = 0;

let score = 0;
let best =
localStorage.getItem("bestScore") || 0;

document
.getElementById("bestScore")
.innerText = best;

let playing = false;

let pipes = [];
let rewards = [];

let lastSpawn = 0;

/* =======================================================
   LOOP
======================================================= */

function loop(){

    if(!playing) return;

    physics();

    updatePipes();

    updateRewards();

    collisions();

    requestAnimationFrame(loop);

}

/* =======================================================
   PHYSICS
======================================================= */

function physics(){

    velocity += gravity;

    if(velocity > 5.5){

        velocity = 5.5;

    }

    y += velocity;

    if(y < 0){

        y = 0;

    }

    const ground =
    window.innerHeight - 95 - 88;

    if(y > ground){

        endGame();

    }

    player.style.left = "22vw";
    player.style.top = y+"px";

    player.style.transform =
    `rotate(${velocity*4}deg)`;

}

/* =======================================================
   START
======================================================= */

document
.getElementById("startBtn")
.onclick = startGame;

document
.getElementById("restartBtn")
.onclick = startGame;

function startGame(){

    document
    .getElementById("startOverlay")
    .style.display = "none";

    document
    .getElementById("gameOverOverlay")
    .style.display = "none";

    reset();

    playing = true;

    loop();

}

function reset(){

    score = 0;

    document
    .getElementById("score")
    .innerText = score;

    pipes.forEach(p=>{

        p.top.remove();
        p.bottom.remove();

    });

    rewards.forEach(r=>r.el.remove());

    pipes = [];
    rewards = [];

    y = window.innerHeight/2;
    velocity = 0;

}

/* =======================================================
   TAP
======================================================= */

document
.getElementById("game")
.addEventListener("click",()=>{

    if(!playing) return;

    velocity = -5.9;

});

document
.addEventListener("keydown",e=>{

    if(e.code === "Space"){

        velocity = -5.9;

    }

});

/* =======================================================
   PIPES
======================================================= */

function updatePipes(){

    const now = Date.now();

    if(now-lastSpawn > 2100){

        spawnPipe();

        lastSpawn = now;

    }

    pipes.forEach((p,i)=>{

        p.x -= speed;

        p.top.style.left =
        p.x+"px";

        p.bottom.style.left =
        p.x+"px";

        if(!p.passed &&
        p.x < window.innerWidth*.22){

            p.passed = true;

            score++;

            document
            .getElementById("score")
            .innerText = score;

        }

        if(p.x < -120){

            p.top.remove();
            p.bottom.remove();

            pipes.splice(i,1);

        }

    });

}

function spawnPipe(){

    document
    .getElementById("difficulty-fill")
    .style.width =
    Math.min(score*2,100)+"%";

    const gap = 280;

    const topHeight =
    rand(120,
    window.innerHeight-gap-260);

    const bottomY =
    topHeight + gap;

    const bottomHeight =
    window.innerHeight-bottomY-95;

    const top =
    document.createElement("div");

    top.className = "pipe";

    top.style.height =
    topHeight+"px";

    top.style.left =
    window.innerWidth+"px";

    top.style.top = "0";

    const topInner =
    document.createElement("div");

    topInner.className =
    "pipe-inner";

    top.appendChild(topInner);

    document
    .getElementById("game")
    .appendChild(top);

    const bottom =
    document.createElement("div");

    bottom.className = "pipe";

    bottom.style.height =
    bottomHeight+"px";

    bottom.style.left =
    window.innerWidth+"px";

    bottom.style.top =
    bottomY+"px";

    const bottomInner =
    document.createElement("div");

    bottomInner.className =
    "pipe-inner";

    bottom.appendChild(bottomInner);

    document
    .getElementById("game")
    .appendChild(bottom);

    pipes.push({

        x:window.innerWidth,
        top,
        bottom,
        passed:false

    });

}

/* =======================================================
   COLLISION
======================================================= */

function collisions(){

    pipes.forEach(p=>{

        if(hit(player,p.top) ||
        hit(player,p.bottom)){

            endGame();

        }

    });

}

function hit(a,b){

    const r1 =
    a.getBoundingClientRect();

    const r2 =
    b.getBoundingClientRect();

    return !(

        r1.top > r2.bottom ||
        r1.bottom < r2.top ||
        r1.right < r2.left ||
        r1.left > r2.right

    );

}

/* =======================================================
   END GAME
======================================================= */

function endGame(){

    if(!playing) return;

    playing = false;

    if(score > best){

        best = score;

        localStorage
        .setItem("bestScore",best);

    }

    document
    .getElementById("finalScore")
    .innerText = score;

    document
    .getElementById("bestScore")
    .innerText = best;

    document
    .getElementById("gameOverOverlay")
    .style.display = "flex";

}

/* =======================================================
   SETTINGS
======================================================= */

const settings =
document.getElementById("settings-panel");

document
.getElementById("settingsBtn")
.onclick = ()=>{

    settings.style.display =
    settings.style.display ===
    "block"
    ?
    "none"
    :
    "block";

};

document
.getElementById("gravityRange")
.oninput = e=>{

    gravity =
    parseFloat(e.target.value);

};

document
.getElementById("speedRange")
.oninput = e=>{

    speed =
    parseFloat(e.target.value);

};

/* =======================================================
   RANDOM
======================================================= */

function rand(min,max){

    return Math.floor(
    Math.random()*(max-min)+min);

}

</script>

</body>
</html>
