<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>IDRE NEMDIYAAG IRBEK</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Segoe UI,sans-serif;
}

/* MAIN GAME */

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:
    linear-gradient(
        to bottom,
        #5ec8ff 0%,
        #3da3ff 35%,
        #66d6ff 100%
    );
}

/* SKY */

#sky{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.cloud{
    position:absolute;
    background:rgba(255,255,255,.82);
    border-radius:100px;
    filter:blur(.3px);
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:rgba(255,255,255,.82);
    border-radius:50%;
}

.cloud::before{
    width:60px;
    height:60px;
    top:-28px;
    left:20px;
}

.cloud::after{
    width:45px;
    height:45px;
    top:-15px;
    right:20px;
}

/* SUN GLOW */

#sun{
    position:absolute;
    top:-80px;
    right:-80px;
    width:240px;
    height:240px;
    border-radius:50%;
    background:
    radial-gradient(circle,
    rgba(255,255,255,.95),
    rgba(255,255,255,.15),
    transparent 70%);
    z-index:1;
}

/* GROUND */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:105px;
    z-index:10;

    background:
    linear-gradient(
        to bottom,
        #63d471,
        #2d9c46
    );

    border-top:5px solid #1f6d35;
}

/* PLAYER */

#player{
    position:absolute;
    width:82px;
    height:82px;
    z-index:100;

    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    transition:transform .08s linear;

    filter:
    drop-shadow(0 6px 12px rgba(0,0,0,.35));
}

/* HUD */

#hud{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:14px;
    z-index:300;
}

#topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:12px 14px;

    border-radius:24px;

    background:
    rgba(0,0,0,.22);

    backdrop-filter:blur(12px);

    border:
    1px solid rgba(255,255,255,.12);
}

/* SCORE */

.score-box{
    display:flex;
    align-items:center;
    gap:10px;

    color:white;
    font-size:21px;
    font-weight:900;
}

/* DIFFICULTY */

#difficulty-box{
    display:flex;
    align-items:center;
    gap:12px;
    color:white;
    font-weight:700;
}

#difficulty-bar{
    width:120px;
    height:10px;
    background:rgba(255,255,255,.15);
    border-radius:50px;
    overflow:hidden;
}

#difficulty-fill{
    width:0%;
    height:100%;
    border-radius:50px;

    background:
    linear-gradient(
        to right,
        #4caf50,
        #ffc107,
        #ff5722
    );
}

/* CREDIT */

#dev-credit{
    position:absolute;
    top:82px;
    right:16px;

    z-index:300;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 14px;

    border-radius:18px;

    background:
    rgba(0,0,0,.24);

    backdrop-filter:blur(10px);

    border:
    1px solid rgba(255,255,255,.12);

    color:white;

    animation:floatCredit 3s infinite ease-in-out;
}

@keyframes floatCredit{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-4px);
    }
}

#dev-credit img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.credit-text{
    display:flex;
    flex-direction:column;
}

.credit-title{
    font-size:12px;
    opacity:.7;
}

.credit-name{
    font-size:14px;
    font-weight:800;
}

/* BUTTONS */

.icon-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;

    background:
    rgba(255,255,255,.15);

    color:white;
    font-size:17px;
}

.icon-btn:active{
    transform:scale(.92);
}

/* PIPES */

.pipe{
    position:absolute;
    width:88px;

    z-index:20;

    overflow:hidden;

    border-radius:16px;

    background:
    rgba(255,255,255,.06);

    border:
    2px solid rgba(255,255,255,.10);

    box-shadow:
    0 0 15px rgba(0,0,0,.18);
}

.pipe-stack{
    width:100%;
    height:100%;

    background-image:url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp');

    background-repeat:repeat-y;
    background-size:72px;
    background-position:center;
}

/* COLLECTIBLE */

.coin{
    position:absolute;
    width:58px;
    height:58px;

    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;

    z-index:50;

    animation:coinFloat 1.3s infinite ease-in-out;

    filter:
    drop-shadow(0 0 12px rgba(255,255,255,.4));
}

@keyframes coinFloat{
    0%,100%{
        transform:translateY(0px) scale(1);
    }
    50%{
        transform:translateY(-7px) scale(1.05);
    }
}

/* TAP TEXT */

#tapText{
    position:absolute;
    bottom:130px;
    width:100%;
    text-align:center;

    color:white;
    font-size:22px;
    font-weight:900;

    z-index:120;

    text-shadow:
    0 3px 10px rgba(0,0,0,.45);

    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:1;
        transform:scale(1);
    }
    50%{
        opacity:.55;
        transform:scale(.98);
    }
}

/* OVERLAYS */

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    rgba(0,0,0,.42);

    backdrop-filter:blur(8px);

    z-index:500;
}

.card{
    width:90%;
    max-width:390px;

    padding:32px;

    border-radius:30px;

    background:
    rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,.14);

    text-align:center;

    color:white;
}

.title{
    font-size:38px;
    font-weight:900;

    margin-bottom:10px;

    background:
    linear-gradient(to right,#ff9966,#ff5e62);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    opacity:.88;
    margin-bottom:26px;
    line-height:1.4;
}

.big-btn{
    width:100%;

    padding:16px;

    margin-top:14px;

    border:none;
    border-radius:18px;

    color:white;
    font-size:18px;
    font-weight:900;

    background:
    linear-gradient(to right,#ff512f,#dd2476);

    box-shadow:
    0 10px 24px rgba(221,36,118,.28);
}

.big-btn:active{
    transform:scale(.97);
}

/* STATS */

.stats{
    margin-top:20px;

    display:flex;
    justify-content:space-around;
}

.stat-num{
    font-size:32px;
    font-weight:900;
}

/* PARTICLES */

.particle{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    z-index:450;
}

/* LOADING */

#loading{
    position:absolute;
    inset:0;
    background:#000;
    z-index:1000;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;
}

.loader{
    width:70px;
    height:70px;

    border-radius:50%;
    border:6px solid rgba(255,255,255,.15);
    border-top:6px solid white;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loading-text{
    margin-top:20px;
    font-size:20px;
    font-weight:700;
}

</style>
</head>

<body>

<div id="game">

    <div id="loading">
        <div class="loader"></div>
        <div class="loading-text">
            Loading Assets...
        </div>
    </div>

    <div id="sky"></div>

    <div id="sun"></div>

    <div id="ground"></div>

    <div id="player"></div>

    <!-- HUD -->

    <div id="hud">

        <div id="topbar">

            <div class="score-box">
                <i class="fas fa-star"></i>
                <span id="score">0</span>
            </div>

            <div id="difficulty-box">

                <span>Difficulty</span>

                <div id="difficulty-bar">
                    <div id="difficulty-fill"></div>
                </div>

            </div>

            <button class="icon-btn" id="muteBtn">
                <i class="fas fa-volume-up"></i>
            </button>

        </div>

    </div>

    <!-- CREDIT -->

    <div id="dev-credit">

        <img src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/IMG_20251123_090853_814.webp">

        <div class="credit-text">
            <div class="credit-title">
                Developer
            </div>

            <div class="credit-name">
                @justbeingchiru
            </div>
        </div>

    </div>

    <!-- TAP -->

    <div id="tapText">
        TAP ANYWHERE TO FLY
    </div>

    <!-- START -->

    <div class="overlay" id="startMenu">

        <div class="card">

            <div class="title">
                IDRE NEMDIYAAG IRBEK
            </div>

            <div class="subtitle">
                Smooth controls • Better gravity • Addictive gameplay • Balanced difficulty
            </div>

            <button class="big-btn" id="startBtn">
                <i class="fas fa-play"></i>
                START GAME
            </button>

        </div>

    </div>

    <!-- GAME OVER -->

    <div class="overlay" id="gameOver"
    style="display:none;">

        <div class="card">

            <div class="title">
                GAME OVER
            </div>

            <div class="stats">

                <div>
                    <div>Score</div>
                    <div class="stat-num" id="finalScore">
                        0
                    </div>
                </div>

                <div>
                    <div>Best</div>
                    <div class="stat-num" id="bestScore">
                        0
                    </div>
                </div>

            </div>

            <button class="big-btn" id="restartBtn">
                PLAY AGAIN
            </button>

        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="flapAudio" preload="auto">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Flap.mp3">
</audio>

<audio id="pointAudio" preload="auto">
<source src="https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/main/Resources/Audio/Point.mp3">
</audio>

<audio id="overAudio" preload="auto">
<source src="https://github.com/MACBRUH-OFC/-Simulator/blob/main/Resources/Audio/GameOverSound.mp3?raw=true">
</audio>

<script>

/* =========================
   ASSET PRELOAD
========================= */

const assets = [

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png',

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/TV9Logo.webp',

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png',

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png',

'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/IMG_20251123_090853_814.webp'

];

let loaded = 0;

assets.forEach(src=>{

    const img = new Image();

    img.onload = assetLoaded;

    img.src = src;

});

function assetLoaded(){

    loaded++;

    if(loaded === assets.length){

        setTimeout(()=>{

            document.getElementById('loading').style.display='none';

        },700);

    }

}

/* =========================
   ELEMENTS
========================= */

const game = document.getElementById('game');
const player = document.getElementById('player');

const scoreText = document.getElementById('score');

const startMenu = document.getElementById('startMenu');
const gameOver = document.getElementById('gameOver');

const finalScore = document.getElementById('finalScore');
const bestScore = document.getElementById('bestScore');

const difficultyFill =
document.getElementById('difficulty-fill');

const flapAudio =
document.getElementById('flapAudio');

const pointAudio =
document.getElementById('pointAudio');

const overAudio =
document.getElementById('overAudio');

/* =========================
   PLAYER IMAGE
========================= */

player.style.backgroundImage =
"url('https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/DFace.png')";

/* =========================
   GAME SETTINGS
========================= */

const GAME = {

    gravity:0.22,
    jump:-6.1,
    maxFall:5.4,

    speed:3.4,

    pipeGap:290,
    minGap:235,

    spawnRate:1800

};

/* =========================
   VARIABLES
========================= */

let playing = false;

let y = 260;
let velocity = 0;

let pipes = [];
let coins = [];

let score = 0;

let difficulty = 0;

let animation;

let lastSpawn = 0;

let muted = false;

let best =
localStorage.getItem('bestFlappyDarshan') || 0;

bestScore.innerText = best;

/* =========================
   CLOUDS
========================= */

createClouds();

/* =========================
   EVENTS
========================= */

document.getElementById('startBtn')
.onclick = startGame;

document.getElementById('restartBtn')
.onclick = startGame;

document.getElementById('muteBtn')
.onclick = toggleMute;

game.addEventListener('click', flap);

document.addEventListener('keydown',e=>{

    if(e.code === 'Space'){

        e.preventDefault();

        flap();

    }

});

/* =========================
   START GAME
========================= */

function startGame(){

    startMenu.style.display='none';
    gameOver.style.display='none';

    resetGame();

    playing = true;

    animation =
    requestAnimationFrame(loop);

}

/* =========================
   RESET
========================= */

function resetGame(){

    pipes.forEach(p=>{

        p.top.remove();
        p.bottom.remove();

    });

    coins.forEach(c=>c.el.remove());

    pipes = [];
    coins = [];

    score = 0;

    difficulty = 0;

    updateScore();

    y = window.innerHeight / 2;

    velocity = 0;

    updatePlayer();

}

/* =========================
   LOOP
========================= */

function loop(){

    physics();

    updatePipes();

    updateCoins();

    collisions();

    animation =
    requestAnimationFrame(loop);

}

/* =========================
   PHYSICS
========================= */

function physics(){

    velocity += GAME.gravity;

    if(velocity > GAME.maxFall){

        velocity = GAME.maxFall;

    }

    y += velocity;

    if(y < 0){

        y = 0;

        velocity = 0;

    }

    const ground =
    window.innerHeight -
    105 -
    player.clientHeight;

    if(y > ground){

        y = ground;

        endGame();

    }

    player.style.transform =
    `rotate(${velocity * 4}deg)`;

    updatePlayer();

}

/* =========================
   PLAYER UPDATE
========================= */

function updatePlayer(){

    player.style.left='22vw';

    player.style.top = y + 'px';

}

/* =========================
   FLAP
========================= */

function flap(){

    if(!playing) return;

    velocity = GAME.jump;

    playAudio(flapAudio);

    createParticles(
        player.offsetLeft + 35,
        y + 35
    );

}

/* =========================
   PIPE UPDATE
========================= */

function updatePipes(){

    const now = Date.now();

    if(now - lastSpawn > GAME.spawnRate){

        spawnPipe();

        lastSpawn = now;

    }

    pipes.forEach((pipe,index)=>{

        pipe.x -= GAME.speed;

        pipe.top.style.left =
        pipe.x + 'px';

        pipe.bottom.style.left =
        pipe.x + 'px';

        if(!pipe.passed &&
        pipe.x < window.innerWidth * .22){

            pipe.passed = true;

            score++;

            updateScore();

            playAudio(pointAudio);

        }

        if(pipe.x < -120){

            pipe.top.remove();
            pipe.bottom.remove();

            pipes.splice(index,1);

        }

    });

}

/* =========================
   SPAWN PIPE
========================= */

function spawnPipe(){

    difficulty += .15;

    if(difficulty > 10){

        difficulty = 10;

    }

    difficultyFill.style.width =
    difficulty * 10 + '%';

    const gap =
    Math.max(
        GAME.minGap,
        GAME.pipeGap - difficulty * 4
    );

    const topHeight =
    random(
        120,
        window.innerHeight - gap - 300
    );

    const bottomY =
    topHeight + gap;

    const bottomHeight =
    window.innerHeight -
    bottomY -
    105;

    const top =
    document.createElement('div');

    top.className='pipe';

    top.style.height =
    topHeight + 'px';

    top.style.left =
    window.innerWidth + 'px';

    top.style.top = '0px';

    const topStack =
    document.createElement('div');

    topStack.className='pipe-stack';

    top.appendChild(topStack);

    game.appendChild(top);

    const bottom =
    document.createElement('div');

    bottom.className='pipe';

    bottom.style.height =
    bottomHeight + 'px';

    bottom.style.left =
    window.innerWidth + 'px';

    bottom.style.top =
    bottomY + 'px';

    const bottomStack =
    document.createElement('div');

    bottomStack.className='pipe-stack';

    bottom.appendChild(bottomStack);

    game.appendChild(bottom);

    pipes.push({

        x:window.innerWidth,

        top,
        bottom,

        passed:false

    });

    if(Math.random() > .45){

        spawnCoin(
            window.innerWidth + 170,
            topHeight + gap / 2 - 30
        );

    }

}

/* =========================
   COINS
========================= */

function spawnCoin(x,yPos){

    const coin =
    document.createElement('div');

    coin.className='coin';

    coin.style.left =
    x + 'px';

    coin.style.top =
    yPos + 'px';

    const img =
    Math.random() > .5

    ? 'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/Heart.png'

    : 'https://raw.githubusercontent.com/MACBRUH-OFC/-Simulator/refs/heads/main/Resources/Images/BrokenBeega.png';

    coin.style.backgroundImage =
    `url('${img}')`;

    game.appendChild(coin);

    coins.push({

        x,
        y:yPos,
        el:coin

    });

}

function updateCoins(){

    coins.forEach((coin,index)=>{

        coin.x -= GAME.speed;

        coin.el.style.left =
        coin.x + 'px';

        if(hit(player,coin.el)){

            createParticles(
                coin.x + 20,
                coin.y + 20
            );

            score += 5;

            updateScore();

            coin.el.remove();

            coins.splice(index,1);

        }

        if(coin.x < -80){

            coin.el.remove();

            coins.splice(index,1);

        }

    });

}

/* =========================
   COLLISIONS
========================= */

function collisions(){

    for(let pipe of pipes){

        if(
            hit(player,pipe.top) ||
            hit(player,pipe.bottom)
        ){

            endGame();

        }

    }

}

function hit(a,b){

    const r1 =
    a.getBoundingClientRect();

    const r2 =
    b.getBoundingClientRect();

    return !(

        r1.top > r2.bottom ||
        r1.bottom < r2.top ||
        r1.right < r2.left ||
        r1.left > r2.right

    );

}

/* =========================
   END GAME
========================= */

function endGame(){

    if(!playing) return;

    playing = false;

    cancelAnimationFrame(animation);

    playAudio(overAudio);

    if(score > best){

        best = score;

        localStorage.setItem(
            'bestFlappyDarshan',
            best
        );

    }

    finalScore.innerText = score;

    bestScore.innerText = best;

    gameOver.style.display='flex';

}

/* =========================
   SCORE
========================= */

function updateScore(){

    scoreText.innerText = score;

}

/* =========================
   AUDIO
========================= */

function playAudio(audio){

    if(muted) return;

    audio.currentTime = 0;

    audio.play();

}

function toggleMute(){

    muted = !muted;

    const icon =
    document.querySelector('#muteBtn i');

    icon.className =
    muted
    ? 'fas fa-volume-mute'
    : 'fas fa-volume-up';

}

/* =========================
   PARTICLES
========================= */

function createParticles(x,yPos){

    for(let i=0;i<8;i++){

        const p =
        document.createElement('div');

        p.className='particle';

        const size =
        random(4,9);

        p.style.width =
        size + 'px';

        p.style.height =
        size + 'px';

        p.style.left =
        x + 'px';

        p.style.top =
        yPos + 'px';

        p.style.background =
        'rgba(255,255,255,.9)';

        game.appendChild(p);

        let life = 30;

        let vx =
        (Math.random() - .5) * 5;

        let vy =
        (Math.random() - .5) * 5;

        function move(){

            if(life <= 0){

                p.remove();

                return;

            }

            life--;

            x += vx;

            yPos += vy;

            p.style.left =
            x + 'px';

            p.style.top =
            yPos + 'px';

            p.style.opacity =
            life / 30;

            requestAnimationFrame(move);

        }

        move();

    }

}

/* =========================
   CLOUDS
========================= */

function createClouds(){

    const sky =
    document.getElementById('sky');

    for(let i=0;i<7;i++){

        const cloud =
        document.createElement('div');

        cloud.className='cloud';

        const w =
        random(100,180);

        const h =
        random(45,75);

        cloud.style.width =
        w + 'px';

        cloud.style.height =
        h + 'px';

        cloud.style.left =
        random(0,window.innerWidth)
        + 'px';

        cloud.style.top =
        random(30,320)
        + 'px';

        sky.appendChild(cloud);

        moveCloud(cloud,w);

    }

}

function moveCloud(cloud,w){

    let x =
    parseFloat(cloud.style.left);

    function move(){

        x -= .25;

        if(x < -w){

            x =
            window.innerWidth + 50;

        }

        cloud.style.left =
        x + 'px';

        requestAnimationFrame(move);

    }

    move();

}

/* =========================
   RANDOM
========================= */

function random(min,max){

    return Math.floor(
        Math.random() *
        (max-min) + min
    );

}

</script>

</body>
</html>
